<!DOCTYPE html>
<html>
<head>
    <title>Product Catalog</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: white;
            margin: 15px;
            padding: 15px;
            width: 180px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        img {
            width: 100px;
        }

        button {
            margin: 20px;
            padding: 10px 20px;
        }
    </style>
</head>

<body>

<h2>Product Catalog</h2>

<button onclick="loadProducts()">Load Products</button>

<div class="container" id="output"></div>

<script>
function loadProducts() {

    fetch("http://localhost:3000/products")
    .then(res => res.json())
    .then(data => {

        let result = "";

        data.forEach(item => {

            result += `
                <div class="card">
                    <img src="${item.image}">
                    <h4>${item.name}</h4>
                    <p>₹${item.price}</p>
                </div>
            `;

        });

        document.getElementById("output").innerHTML = result;
    })
    .catch(() => {
        document.getElementById("output").innerHTML = "Error loading products";
    });
}
</script>

</body>
</html>
