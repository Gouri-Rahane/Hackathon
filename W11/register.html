<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #eef4ff;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Registration</h2>

    <form id="myForm">

        <!-- Name -->
        <input type="text" id="name" class="form-control mb-2" placeholder="Full Name" required>
        <small class="text-muted">Enter your full name</small>

        <!-- Email -->
        <input type="email" id="email" class="form-control mt-3"
               placeholder="Email"
               required pattern=".+@.+\.com">
        <small class="text-muted">example@gmail.com</small>

        <!-- Mobile -->
        <input type="tel" id="mobile" class="form-control mt-3"
               placeholder="Mobile"
               required pattern="[0-9]{10}">
        <small class="text-muted">10-digit mobile number</small>

        <!-- DOB -->
        <input type="date" id="dob" class="form-control mt-3" required>

        <!-- City -->
        <input type="text" id="city" class="form-control mt-3" placeholder="City" required>

        <!-- Address -->
        <textarea id="address" class="form-control mt-3" placeholder="Address" required></textarea>

        <!-- Password -->
        <input type="password" id="password" class="form-control mt-3"
               placeholder="Password"
               required
               pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[@$!%*?&]).{8,}">
        <small class="text-muted">
            Min 8 chars, 1 uppercase, 1 lowercase, 1 number, 1 special char
        </small>

        <button class="btn btn-primary w-100 mt-4">Register</button>
    </form>

    <a href="login.html" class="d-block text-center mt-3">Login</a>
</div>

<script>
const form = document.getElementById("myForm");
const inputs = form.querySelectorAll("input, textarea");

// 🔁 LIVE VALIDATION (RED / GREEN)
inputs.forEach(input => {
    input.addEventListener("input", () => {
        if (input.checkValidity()) {
            input.classList.add("is-valid");
            input.classList.remove("is-invalid");
        } else {
            input.classList.add("is-invalid");
            input.classList.remove("is-valid");
        }
    });
});

form.addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.getElementById("name");
    let email = document.getElementById("email");
    let mobile = document.getElementById("mobile");
    let dob = document.getElementById("dob");
    let city = document.getElementById("city");
    let address = document.getElementById("address");
    let password = document.getElementById("password");

    let users = JSON.parse(localStorage.getItem("users")) || [];

    // 🚫 DUPLICATE CHECK
    let exists = users.some(u => 
        u.email === email.value || u.mobile === mobile.value
    );

    if (exists) {
        alert("User already exists");

        // 🔴 Mark duplicate fields
        email.classList.add("is-invalid");
        mobile.classList.add("is-invalid");

        return;
    }

    // ✅ If valid → green
    [name, email, mobile, dob, city, address, password].forEach(field => {
        field.classList.add("is-valid");
        field.classList.remove("is-invalid");
    });

    let user = {
        name: name.value,
        email: email.value,
        mobile: mobile.value,
        dob: dob.value,
        city: city.value,
        address: address.value,
        password: password.value
    };

    users.push(user);
    localStorage.setItem("users", JSON.stringify(users));

    // AJAX (extra marks)
    fetch("https://jsonplaceholder.typicode.com/users", {
        method: "POST",
        body: JSON.stringify(user),
        headers: { "Content-Type": "application/json" }
    });

    alert("Registered Successfully!");
    form.reset();

    // remove colors after reset
    inputs.forEach(i => i.classList.remove("is-valid"));
});
</script>
</body>
</html>
