<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book - Bookstore</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <nav class="navbar">
        <span class="brand">📚 Bookstore</span>
        <span class="badge">MongoDB</span>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/books">Books</a>
            <a href="/add" class="active">Add Book</a>
        </div>
    </nav>
    <div class="page">
        <div class="form-card">
            <h2>Add a New Book</h2>
            <form action="/add" method="POST">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" name="title" placeholder="e.g. The Great Gatsby" required>
                </div>
                <div class="form-group">
                    <label>Author</label>
                    <input type="text" name="author" placeholder="e.g. F. Scott Fitzgerald" required>
                </div>
                <div class="form-group">
                    <label>Price (Rs.)</label>
                    <input type="number" name="price" placeholder="e.g. 350" min="1" required>
                </div>
                <div class="form-group">
                    <label>Genre</label>
                    <select name="genre" required>
                        <option value="">-- Select Genre --</option>
                        <option>Fiction</option>
                        <option>Non-Fiction</option>
                        <option>Technology</option>
                        <option>Science</option>
                        <option>History</option>
                        <option>Biography</option>
                        <option>Mystery</option>
                        <option>Fantasy</option>
                        <option>Romance</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Add Book</button>
                    <a href="/books" class="btn btn-ghost">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
