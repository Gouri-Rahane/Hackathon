<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Store</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .card img {
            height: 150px;
            object-fit: cover;
        }

        .filter-box {
            background: white;
            padding: 15px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="container-fluid">

    <!-- HEADER -->
    <div class="bg-dark text-white p-3">
        <h3>E-Commerce Store</h3>
    </div>

    <div class="row mt-3">

        <!-- SIDEBAR -->
        <div class="col-md-3">
            <div class="filter-box">

                <h5>Filters</h5>

                <!-- CATEGORY -->
                <h6 class="mt-3">Category</h6>
                <div><input type="checkbox" name="category" value="Electronics" onchange="applyFilters()"> Electronics</div>
                <div><input type="checkbox" name="category" value="Accessories" onchange="applyFilters()"> Accessories</div>
                <div><input type="checkbox" name="category" value="Clothing" onchange="applyFilters()"> Clothing</div>

                <!-- PRICE -->
                <h6 class="mt-3">Price</h6>
                <div><input type="checkbox" name="price" value="low" onchange="applyFilters()"> Under ₹5000</div>
                <div><input type="checkbox" name="price" value="mid" onchange="applyFilters()"> ₹5000 - ₹20000</div>
                <div><input type="checkbox" name="price" value="high" onchange="applyFilters()"> Above ₹20000</div>

                <!-- BRAND -->
                <h6 class="mt-3">Brand</h6>
                <div><input type="checkbox" name="brand" value="Sony" onchange="applyFilters()"> Sony</div>
                <div><input type="checkbox" name="brand" value="Samsung" onchange="applyFilters()"> Samsung</div>
                <div><input type="checkbox" name="brand" value="Apple" onchange="applyFilters()"> Apple</div>
                <div><input type="checkbox" name="brand" value="Nike" onchange="applyFilters()"> Nike</div>
                <div><input type="checkbox" name="brand" value="Adidas" onchange="applyFilters()"> Adidas</div>

            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="col-md-9">

            <!-- SORT -->
            <div class="d-flex justify-content-end mb-3">
                <select class="form-select w-auto" onchange="sortProducts(this.value)">
                    <option value="">Sort by Popularity</option>
                    <option value="low">Price Low to High</option>
                    <option value="high">Price High to Low</option>
                </select>
            </div>

            <!-- PRODUCTS -->
            <div class="row" id="productContainer"></div>

        </div>

    </div>

</div>

<script>

let allProducts = [
    {name:"Headphones", price:7999, category:"Electronics", brand:"Sony"},
    {name:"Smartwatch", price:12999, category:"Electronics", brand:"Apple"},
    {name:"Mouse", price:2499, category:"Accessories", brand:"Samsung"},
    {name:"Laptop Stand", price:1999, category:"Accessories", brand:"Generic"},
    {name:"Keyboard", price:3499, category:"Accessories", brand:"Samsung"},
    {name:"Speaker", price:5999, category:"Electronics", brand:"Sony"},
    {name:"Camera", price:45999, category:"Electronics", brand:"Sony"},
    {name:"Mobile", price:20999, category:"Electronics", brand:"Samsung"},
    {name:"T-Shirt", price:999, category:"Clothing", brand:"Nike"},
    {name:"Shoes", price:2999, category:"Clothing", brand:"Adidas"}
];

let products = [...allProducts];

function displayProducts() {
    let container = document.getElementById("productContainer");
    container.innerHTML = "";

    products.forEach(p => {
        container.innerHTML += `
            <div class="col-md-3 col-sm-6 mb-4">
                <div class="card">
                    <img src="${p.img}" class="card-img-top">
                    <div class="card-body text-center">
                        <h6>${p.name}</h6>
                        <p class="text-muted">${p.brand}</p>
                        <p class="text-success fw-bold">₹${p.price}</p>
                    </div>
                </div>
            </div>
        `;
    });
}

function sortProducts(type) {
    if (type === "low") {
        products.sort((a, b) => a.price - b.price);
    } else if (type === "high") {
        products.sort((a, b) => b.price - a.price);
    }
    displayProducts();
}

function applyFilters() {

    let selectedCategories = [];
    let selectedPrices = [];
    let selectedBrands = [];

    document.querySelectorAll('input[name="category"]:checked')
        .forEach(c => selectedCategories.push(c.value));

    document.querySelectorAll('input[name="price"]:checked')
        .forEach(p => selectedPrices.push(p.value));

    document.querySelectorAll('input[name="brand"]:checked')
        .forEach(b => selectedBrands.push(b.value));

    products = allProducts.filter(p => {

        let categoryMatch = selectedCategories.length === 0 || selectedCategories.includes(p.category);

        let priceMatch = selectedPrices.length === 0 ||
            (selectedPrices.includes("low") && p.price < 5000) ||
            (selectedPrices.includes("mid") && p.price >= 5000 && p.price <= 20000) ||
            (selectedPrices.includes("high") && p.price > 20000);

        let brandMatch = selectedBrands.length === 0 || selectedBrands.includes(p.brand);

        return categoryMatch && priceMatch && brandMatch;
    });

    displayProducts();
}

displayProducts();

</script>

</body>
</html>
