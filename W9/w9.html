<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>

    <!-- Bootstrap (for better UI) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #eef4ff;
        }

        .card {
            max-width: 400px;
            margin: auto;
            margin-top: 50px;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="card shadow">
    <h2>Weather App</h2>

    <input type="text" id="input" class="form-control mb-3" placeholder="Enter city (Pune, Mumbai, Delhi)">

    <button class="btn btn-primary w-100" onclick="getData()">Get Weather</button>

    <div id="output" class="mt-3"></div>
</div>

<script>
function getData() {

    let city = document.getElementById("input").value.toLowerCase();

    // 🌍 LOCAL DATA (AJAX Simulation)
    let weatherData = {
        pune: {temp: 30, humidity: 60, condition: "Sunny"},
        mumbai: {temp: 32, humidity: 80, condition: "Humid"},
        delhi: {temp: 28, humidity: 50, condition: "Cloudy"}
    };

    // 🔁 Simulating AJAX (like fetch delay)
    setTimeout(() => {

        let data = weatherData[city];

        if(data) {
            document.getElementById("output").innerHTML = `
                <h4>${city.toUpperCase()}</h4>
                <p> Temperature: ${data.temp}°C</p>
                <p> Humidity: ${data.humidity}%</p>
                <p> Condition: ${data.condition}</p>
            `;
        } else {
            document.getElementById("output").innerHTML =
                "<p class='text-danger'>City not found</p>";
        }

    }, 500); // simulate AJAX delay
}
</script>

</body>
</html>
