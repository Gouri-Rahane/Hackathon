<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#eef4ff;">

<div class="container mt-5">
    <h2 class="text-center mb-4">Registration</h2>

    <form id="myForm">

        <input type="text" id="name" class="form-control mb-2" placeholder="Full Name" required>

        <input type="email" id="email" class="form-control mt-3"
               placeholder="Email"
               required pattern=".+@.+\.com">

        <input type="tel" id="mobile" class="form-control mt-3"
               placeholder="Mobile"
               required pattern="[0-9]{10}">

        <input type="date" id="dob" class="form-control mt-3" required>

        <input type="text" id="city" class="form-control mt-3" placeholder="City" required>

        <textarea id="address" class="form-control mt-3" placeholder="Address" required></textarea>

        <input type="password" id="password" class="form-control mt-3"
               placeholder="Password"
               required
               pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[@$!%*?&]).{8,}">

        <button class="btn btn-primary w-100 mt-4">Register</button>
    </form>

    <a href="login.html" class="d-block text-center mt-3">Login</a>
</div>

<script>
const form = document.getElementById("myForm");
const inputs = form.querySelectorAll("input, textarea");

// Live validation
inputs.forEach(input => {
    input.addEventListener("input", () => {
        if (input.checkValidity()) {
            input.classList.add("is-valid");
            input.classList.remove("is-invalid");
        } else {
            input.classList.add("is-invalid");
            input.classList.remove("is-valid");
        }
    });
});

form.addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let mobile = document.getElementById("mobile").value;
    let dob = document.getElementById("dob").value;
    let city = document.getElementById("city").value;
    let address = document.getElementById("address").value;
    let password = document.getElementById("password").value;

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let exists = users.some(u => 
        u.email === email || u.mobile === mobile
    );

    if (exists) {
        alert("User already exists!");
        return;
    }

    let user = {
        name: name,
        email: email,
        mobile: mobile,
        dob: dob,
        city: city,
        address: address,
        password: password
    };

    users.push(user);
    localStorage.setItem("users", JSON.stringify(users));

    alert("Registered Successfully!");
    form.reset();
});
</script>

</body>
</html>
