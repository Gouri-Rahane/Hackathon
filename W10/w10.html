<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #eef4ff;
        }

        .card {
            max-width: 500px;
            margin: auto;
            margin-top: 50px;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="card shadow">
    <h2 class="text-center">To-Do List</h2>

    <!-- INPUT -->
    <input type="text" id="input" class="form-control mb-3" placeholder="Enter task">

    <button class="btn btn-primary w-100" onclick="addTask()">Add Task</button>

    <div id="output" class="mt-3"></div>
</div>

<script>
let tasks = [];

// ➕ ADD TASK (AJAX simulation)
function addTask() {
    let task = document.getElementById("input").value;

    if(task === "") {
        alert("Enter a task");
        return;
    }

    // simulate AJAX delay
    setTimeout(() => {
        tasks.push(task);
        displayTasks();
        document.getElementById("input").value = "";
    }, 300);
}

// 📋 DISPLAY
function displayTasks() {
    let output = "";

    tasks.forEach((t, i) => {
        output += `
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span>${t}</span>
                <div>
                    <button class="btn btn-warning btn-sm" onclick="editTask(${i})">Edit</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteTask(${i})">Delete</button>
                </div>
            </div>
        `;
    });

    document.getElementById("output").innerHTML = output;
}

// ❌ DELETE TASK (AJAX simulation)
function deleteTask(index) {
    setTimeout(() => {
        tasks.splice(index, 1);
        displayTasks();
    }, 300);
}

// ✏️ UPDATE TASK (IMPORTANT)
function editTask(index) {
    let newTask = prompt("Edit task:", tasks[index]);

    if(newTask !== null && newTask !== "") {
        setTimeout(() => {
            tasks[index] = newTask;
            displayTasks();
        }, 300);
    }
}
</script>

</body>
</html>
